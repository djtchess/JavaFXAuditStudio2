name: Frontend CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  frontend-tests:
    name: Frontend validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run static checks
        run: npm run typecheck

      - name: Run frontend tests with coverage
        run: npm run test:coverage

      - name: Build frontend
        run: npm run build

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage
          if-no-files-found: error

      - name: Compute coverage summary
        id: coverage
        run: |
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const fs = require('fs');
          const summary = JSON.parse(fs.readFileSync('coverage/javafx-audit-studio-front/coverage-summary.json', 'utf8')).total;
          const pct = (entry) => Number(entry?.pct ?? 0).toFixed(2);
          process.stdout.write(`line=${pct(summary.lines)}\n`);
          process.stdout.write(`branch=${pct(summary.branches)}\n`);
          NODE

      - name: Publish coverage comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- jas-frontend-coverage -->';
            const body = `${marker}
            ### Frontend coverage
            - Line coverage: ${{ steps.coverage.outputs.line }}%
            - Branch coverage: ${{ steps.coverage.outputs.branch }}%`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(comment => comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  frontend-docker:
    name: Frontend Docker build
    runs-on: ubuntu-latest
    needs: frontend-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build -t javafx-audit-studio-frontend:ci frontend
