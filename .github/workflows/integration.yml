name: Integration CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

permissions:
  contents: read

jobs:
  postgres-smoke:
    name: PostgreSQL smoke test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: javafx_audit
          POSTGRES_USER: javafx_audit
          POSTGRES_PASSWORD: changeme
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U javafx_audit -d javafx_audit"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Make local scripts executable
        run: chmod +x backend/mvnw scripts/test.sh

      - name: Run PostgreSQL smoke integration
        env:
          CI_POSTGRES_ENABLED: true
          MAVEN_REPO_LOCAL: /home/runner/.m2/repository
          DB_URL: jdbc:postgresql://localhost:5432/javafx_audit
          DB_USER: javafx_audit
          DB_PASSWORD: changeme
        run: ./scripts/test.sh backend-postgres-smoke

  compose-validation:
    name: Docker compose validation
    runs-on: ubuntu-latest
    needs: postgres-smoke
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose file
        run: docker compose config

      - name: Build Docker images
        run: docker compose build backend frontend
