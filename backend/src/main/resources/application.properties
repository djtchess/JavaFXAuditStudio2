spring.application.name=javaFxAuditStudio

# --- CORS (JAS-03) ---
# Origine autorisee : ne jamais mettre * en prod. Surcharger via variable d'env FRONTEND_ORIGIN.
app.frontend.origin=http://localhost:4200
app.cors.max-age=3600

# --- Erreurs REST (JAS-03) ---
# Interdit l'exposition de stack traces et de messages internes Spring dans les reponses HTTP.
server.error.include-stacktrace=never
server.error.include-message=always
server.error.include-binding-errors=never
server.error.include-exception=false

# --- Logs (JAS-03) ---
# Niveau INFO par defaut. Passer a DEBUG en dev via variable d'env ou profil Spring.
logging.level.ff.ss.javaFxAuditStudio=INFO
# Pour voir les prompts complets envoyes a l'IA (decommenter en dev uniquement) :
logging.level.ff.ss.javaFxAuditStudio.adapters.out.ai.ClaudeCodeCliAiEnrichmentAdapter=DEBUG

# --- Observabilite (JAS-52) ---
# Endpoints Actuator exposes pour health et metrics.
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.jas.analysis.pipeline.duration=true
management.metrics.distribution.percentiles-histogram.jas.analysis.pipeline.stage.duration=true
management.metrics.distribution.percentiles-histogram.jas.llm.enrichment.duration=true

# Activer le profil dev pour les logs DEBUG : spring.profiles.active=dev
# Le correlationId est automatiquement injecte dans les logs via MDC (CorrelationFilter)
# Aucun contenu source (code Java/FXML analyse) ne doit apparaitre dans les logs

# --- Datasource (JAS-EPIC-08) ---
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/javafx_audit}
spring.datasource.username=${DB_USER:javafx_audit}
spring.datasource.password=${DB_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --- Analyse : methodes lifecycle JavaFX exclues (JAS-003) ---
# Liste separee par virgules. Exactitude du nom : initialize != initializeSpecifique
analysis.lifecycle-methods.excluded=initialize,dispose,stop,start,shutdown,destroy,postConstruct,preDestroy

# --- Analyse : patterns de classification (JAS-002) ---
# Les listes ci-dessous surchargent les valeurs par defaut definies dans AnalysisProperties.
# Decommenter et adapter pour personnaliser la detection de responsabilites des handlers JavaFX.
# analysis.classification-patterns.ui-keywords=setText,setVisible,getChildren
# analysis.classification-patterns.application-keywords=execute,invoke,process
# analysis.classification-patterns.business-keywords=service.save,repository,persist
# analysis.classification-patterns.technical-keywords=restTemplate,webClient,http
# analysis.classification-patterns.service-call-suffixes=Service.,Manager.,Handler.

# --- Analyse : prefixes de gardes Policy (JAS-020) ---
# analysis.classification-patterns.policy-guard-prefixes=is,can,has,should

# --- Enrichissement IA (JAS-022 / JAS-017) ---
# Desactiver completement : ai.enrichment.enabled=false (defaut)
# Fournisseurs supportes : claude-code, openai-gpt54
# IMPORTANT : les credentials sont UNIQUEMENT injectes via variables d'environnement.
# Ne jamais mettre de valeur en clair dans ce fichier.
#
# Variables d'environnement attendues selon le fournisseur choisi :
#   Pour claude-code  : CLAUDE_API_KEY=sk-ant-...
#   Pour openai-gpt54 : OPENAI_API_KEY=sk-...
#
ai.enrichment.enabled=true
# Fournisseurs disponibles :
#   claude-code     : API Anthropic (credits prepayés — CLAUDE_API_KEY requis)
#   openai-gpt54    : API OpenAI (credits prepayés — OPENAI_API_KEY requis)
#   claude-code-cli : Claude Code CLI local (abonnement Claude Code, pas de cle API)
ai.enrichment.provider=claude-code-cli
ai.enrichment.timeout-ms=30000
# max_tokens par type de tache IA (IAP-6)
ai.enrichment.max-tokens-by-task.NAMING=1024
ai.enrichment.max-tokens-by-task.DESCRIPTION=1024
ai.enrichment.max-tokens-by-task.CLASSIFICATION_HINT=1024
ai.enrichment.max-tokens-by-task.ARTIFACT_REVIEW=2048
ai.enrichment.max-tokens-by-task.SPRING_BOOT_GENERATION=4096
# Taille maximale acceptee pour une reponse LLM avant troncature defensive (IAP-7)
ai.enrichment.max-response-size-bytes=524288
# Longueur maximale d'un message degrade avant troncature defensive (IAP-8)
ai.enrichment.max-degradation-reason-length=200
# Commande CLI Claude Code (defaut : "claude"). Sur Windows, le PATH doit inclure claude.cmd.
ai.enrichment.cli-command=claude
# Proxy HTTP sortant (reseau corporate) — decommenter et adapter si connexion directe impossible
 ai.enrichment.proxy.host=proxy-web.cnamts.fr
 ai.enrichment.proxy.port=3128
ai.enrichment.audit-enabled=true
ai.enrichment.claude-code.api-key=${CLAUDE_API_KEY:}
ai.enrichment.openai.api-key=${OPENAI_API_KEY:}

# --- Sanitisation (JAS-018) ---
ai.sanitization.profile-version=1.0
ai.sanitization.max-tokens=32000
ai.sanitization.enabled=true

# --- Audit LLM (JAS-029) ---
ai.audit.enabled=true

# --- Scan Semgrep post-sanitisation (optionnel — requiert semgrep sur PATH) ---
# Activer uniquement si Semgrep est installe sur PATH
# Les regles statiques sont chargees depuis semgrep/sanitization-rules.yaml sur le classpath.
# En cas d'absence, un fallback inline est utilise automatiquement.
ai.sanitization.semgrep.enabled=false
ai.sanitization.semgrep.cli-command=semgrep
ai.sanitization.semgrep.timeout-seconds=30
# Passer a true en production si les regles sont stables et validees
ai.sanitization.semgrep.fail-on-findings=false
ai.sanitization.semgrep.business-terms=
# Termes supplementaires toujours bloques (ex: noms de domaine internes)
ai.sanitization.semgrep.denylist=

# --- Retry backoff exponentiel (IAP-4) ---
ai.enrichment.retry.max-retries=2
ai.enrichment.retry.initial-backoff-ms=500
ai.enrichment.retry.multiplier=2.0

# --- OpenAPI / Swagger UI (JAS-028) ---
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.default-models-expand-depth=1
springdoc.swagger-ui.try-it-out-enabled=true
