spring.application.name=javaFxAuditStudio

# --- CORS (JAS-03) ---
# Origine autorisee : ne jamais mettre * en prod. Surcharger via variable d'env FRONTEND_ORIGIN.
app.frontend.origin=http://localhost:4200
app.cors.max-age=3600

# --- Erreurs REST (JAS-03) ---
# Interdit l'exposition de stack traces et de messages internes Spring dans les reponses HTTP.
server.error.include-stacktrace=never
server.error.include-message=always
server.error.include-binding-errors=never
server.error.include-exception=false

# --- Logs (JAS-03) ---
# Niveau INFO par defaut. Passer a DEBUG en dev via variable d'env ou profil Spring.
# Le contenu des fichiers source analyses ne doit jamais apparaitre dans les logs.
logging.level.ff.ss.javaFxAuditStudio=INFO

# --- Observabilite (JAS-52) ---
# Activer le profil dev pour les logs DEBUG : spring.profiles.active=dev
# Le correlationId est automatiquement injecte dans les logs via MDC (CorrelationFilter)
# Aucun contenu source (code Java/FXML analyse) ne doit apparaitre dans les logs

# --- Datasource (JAS-EPIC-08) ---
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/javafx_audit}
spring.datasource.username=${DB_USER:javafx_audit}
spring.datasource.password=${DB_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --- Analyse : methodes lifecycle JavaFX exclues (JAS-003) ---
# Liste separee par virgules. Exactitude du nom : initialize != initializeSpecifique
analysis.lifecycle-methods.excluded=initialize,dispose,stop,start,shutdown,destroy,postConstruct,preDestroy

# --- Analyse : patterns de classification (JAS-002) ---
# Les listes ci-dessous surchargent les valeurs par defaut definies dans AnalysisProperties.
# Decommenter et adapter pour personnaliser la detection de responsabilites des handlers JavaFX.
# analysis.classification-patterns.ui-keywords=setText,setVisible,getChildren
# analysis.classification-patterns.application-keywords=execute,invoke,process
# analysis.classification-patterns.business-keywords=service.save,repository,persist
# analysis.classification-patterns.technical-keywords=restTemplate,webClient,http
