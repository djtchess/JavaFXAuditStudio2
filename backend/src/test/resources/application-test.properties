spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false
app.security.api-key-enabled=false
app.security.api-key=
app.security.token-query-parameter=apiKey

# --- Enrichissement IA : surcharge pour les tests (profil "test") ---
# Les ITs AiEnrichmentStatusControllerIT attendent enabled=false et provider=claude-code.
# Le provider claude-code-cli du profil prod ne convient pas en test (credentialPresent=true
# sans cle, car le CLI local ne requiert pas d'API key).
ai.enrichment.enabled=false
ai.enrichment.provider=claude-code
ai.enrichment.claude-code.api-key=
ai.enrichment.openai.api-key=

# --- Sanitisation (JAS-018) : desactive en test pour eviter l'acces disque ---
ai.sanitization.enabled=true
ai.sanitization.profile-version=1.0
ai.sanitization.max-tokens=32000

# --- Scan Semgrep : desactive en test (Semgrep non requis sur le PATH de CI) ---
ai.sanitization.semgrep.enabled=false
ai.sanitization.semgrep.fail-on-findings=false
ai.sanitization.semgrep.denylist=
