services:
  postgres:
    image: postgres:15
    container_name: javafx_audit_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: javafx_audit
      POSTGRES_USER: javafx_audit
      POSTGRES_PASSWORD: changeme
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U javafx_audit -d javafx_audit"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: javafx-audit-studio-backend:latest
    container_name: javafx_audit_backend
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/javafx_audit
      DB_USER: javafx_audit
      DB_PASSWORD: ${DB_PASSWORD}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:4200}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: javafx-audit-studio-frontend:latest
    container_name: javafx_audit_frontend
    ports:
      - "4200:80"
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
