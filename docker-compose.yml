services:
  postgres:
    image: postgres:15
    container_name: javafx_audit_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-javafx_audit}
      POSTGRES_USER: ${POSTGRES_USER:-javafx_audit}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U javafx_audit -d javafx_audit"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: javafx-audit-studio-backend:latest
    container_name: javafx_audit_backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_URL: ${DB_URL:-jdbc:postgresql://postgres:5432/javafx_audit}
      DB_USER: ${DB_USER:-javafx_audit}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:4200}
      AI_ENRICHMENT_ENABLED: ${AI_ENRICHMENT_ENABLED:-false}
      AI_ENRICHMENT_PROVIDER: ${AI_ENRICHMENT_PROVIDER:-openai-gpt54}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: javafx-audit-studio-frontend:latest
    container_name: javafx_audit_frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    environment:
      NGINX_ENTRYPOINT_QUIET_LOGS: "1"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
